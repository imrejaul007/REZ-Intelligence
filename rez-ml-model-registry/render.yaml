services:
  - type: web
    name: rez-ml-model-registry
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4101"
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKENS_JSON
        sync: false
