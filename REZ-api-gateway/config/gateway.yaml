# REZ API Gateway Configuration
# NOTE: All secrets should be provided via environment variables
# DO NOT hardcode API keys or tokens in this file

app:
  host: "0.0.0.0"
  port: ${GATEWAY_PORT:-4000}
  env: ${NODE_ENV:-development}

# Rate limiting configuration
rateLimit:
  windowMs: 60000  # 1 minute window
  maxRequests: 100  # Max requests per window per API key
  maxRequestsPerUser: 1000  # Max requests per window per user ID
  skipFailedRequests: false
  keyGenerator: "apiKey"  # or "userId"

# Services configuration
services:
  - name: identity-bridge
    url: ${IDENTITY_BRIDGE_URL:-http://localhost:4092}
    timeout: 30000
    retryAttempts: 3
    retryDelay: 1000
    healthCheck:
      enabled: true
      interval: 30000
      path: /health

  - name: unified-recs
    url: ${UNIFIED_RECS_URL:-http://localhost:4090}
    timeout: 30000
    retryAttempts: 3
    retryDelay: 1000
    healthCheck:
      enabled: true
      interval: 30000
      path: /health

  - name: feedback-collector
    url: ${FEEDBACK_COLLECTOR_URL:-http://localhost:4085}
    timeout: 30000
    retryAttempts: 3
    retryDelay: 1000
    healthCheck:
      enabled: true
      interval: 30000
      path: /health

  - name: notification-router
    url: ${NOTIFICATION_ROUTER_URL:-http://localhost:4093}
    timeout: 30000
    retryAttempts: 3
    retryDelay: 1000
    healthCheck:
      enabled: true
      interval: 30000
      path: /health

  - name: event-platform
    url: ${EVENT_PLATFORM_URL:-http://localhost:4008}
    timeout: 30000
    retryAttempts: 3
    retryDelay: 1000
    healthCheck:
      enabled: true
      interval: 30000
      path: /health

# Authentication configuration
# API keys must be provided via environment variables
# Format: JSON array of {key, appId, permissions, rateLimit}
# Example: API_KEYS='[{"key":"key-here","appId":"app1","permissions":["read","write"],"rateLimit":100}]'
auth:
  enabled: true
  apiKeysHeader: "x-api-key"
  internalTokenHeader: "x-internal-token"
  # API keys loaded from API_KEYS environment variable (JSON array)
  # Each key must have: key, appId, permissions (array), rateLimit
  validApiKeys: []
  # Internal service tokens loaded from INTERNAL_SERVICE_TOKENS_JSON
  # Format: JSON object { "service-name": "token" }
  internalServiceTokens: {}

# Logging configuration
logging:
  level: ${LOG_LEVEL:-info}  # debug, info, warn, error
  format: ${LOG_FORMAT:-json}  # json, simple
  includeTimestamp: true
  includeRequestId: true
  includeUserId: true
  redactFields: ["password", "apiKey", "token", "authorization"]

# CORS configuration
cors:
  enabled: true
  origins:
    - ${CORS_ORIGIN_1:-https://rez.example.com}
    - ${CORS_ORIGIN_2:-https://admin.rez.example.com}
    - ${CORS_ORIGIN_3:-http://localhost:3000}
  methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
  allowedHeaders: ["Content-Type", "Authorization", "X-API-Key", "X-Request-ID", "X-User-ID"]
  exposedHeaders: ["X-RateLimit-Remaining", "X-RateLimit-Reset"]
  credentials: true
  maxAge: 86400

# Circuit breaker configuration
circuitBreaker:
  enabled: true
  timeout: 60000  # Time to wait for a response
  errorThresholdPercentage: 50  # % of failures before opening circuit
  resetTimeout: 30000  # Time to wait before attempting to close circuit
  volumeThreshold: 10  # Minimum number of requests before evaluating

# Request/Response configuration
request:
  maxBodySize: "10mb"
  timeout: 30000
  trustProxy: true

response:
  compressionEnabled: true
  compressionThreshold: 1024

# Aggregation settings (for response aggregation)
aggregation:
  maxConcurrentRequests: 5
  timeout: 25000
  parallel: true
