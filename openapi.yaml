openapi: 3.0.3
info:
  title: REZ Intelligence API
  description: AI/ML Services for the REZ Ecosystem
  version: 1.0.0
  contact:
    name: REZ Engineering
    email: engineering@rez.money

servers:
  - url: http://localhost:4020
    description: Local development
  - url: https://rez-intelligence-hub.onrender.com
    description: Production

tags:
  - name: Health
    description: Service health and status
  - name: Profiles
    description: User profile management
  - name: Voice
    description: Voice AI processing
  - name: Agents
    description: AI Agent status

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /profile/user:
    post:
      tags:
        - Profiles
      summary: Create or update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  format: uuid
                email:
                  type: string
                  format: email
                phone:
                  type: string
                name:
                  type: string
                metadata:
                  type: object
      responses:
        '200':
          description: Profile updated
        '400':
          description: Validation error

  /profile/user/{userId}:
    get:
      tags:
        - Profiles
      summary: Get user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Profile found
        '404':
          description: Profile not found

  /profiles:
    get:
      tags:
        - Profiles
      summary: List profiles (paginated)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of profiles

  /api/voice/process:
    post:
      tags:
        - Voice
      summary: Process voice or text input
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                userId:
                  type: string
                  format: uuid
                sessionId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Processed successfully

  /api/voice/text:
    post:
      tags:
        - Voice
      summary: Process text with TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                voiceId:
                  type: string
      responses:
        '200':
          description: Text processed with audio

  /api/agents/status:
    get:
      tags:
        - Agents
      summary: Get agent status
      responses:
        '200':
          description: Agent status
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        status:
                          type: string
                          enum: [active, idle, error]
                        uptime:
                          type: integer

  /webhook/voice:
    post:
      tags:
        - Voice
      summary: Twilio webhook for voice calls
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                CallSid:
                  type: string
                From:
                  type: string
                TranscriptSid:
                  type: string
      responses:
        '200':
          description: Webhook processed
