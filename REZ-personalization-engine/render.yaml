services:
  - type: web
    name: rez-personalization-engine
    env: node
    region: singapore
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4017
      - key: MONGODB_URI
        sync: false
