version: '3.8'

services:
  # ============================================
  # Infrastructure
  # ============================================
  mongodb:
    image: mongo:7
    container_name: rez-intelligence-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rez-intelligence-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Agent Registry
  # ============================================
  rez-agent-registry:
    build:
      context: ./rez-agent-registry
      dockerfile: Dockerfile
    container_name: rez-agent-registry
    restart: unless-stopped
    ports:
      - "4011:4011"
    environment:
      - NODE_ENV=production
      - PORT=4011
      - MONGODB_URI=mongodb://mongodb:27017/rez_registry
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rez-network

  # ============================================
  # NEW: MERCHANT GROWTH OS SERVICES (Ports 4290-4299, 4211-4214)
  # ============================================

  # Port 4290 - Budget Optimizer
  rez-budget-optimizer:
    build:
      context: ./REZ-budget-optimizer
      dockerfile: Dockerfile
    container_name: rez-budget-optimizer
    restart: unless-stopped
    ports:
      - "4290:4290"
    environment:
      - NODE_ENV=production
      - PORT=4290
      - MONGODB_URI=mongodb://mongodb:27017/rez_budget_optimizer
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rez-network

  # Port 4291 - Growth Playbook
