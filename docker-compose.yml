version: '3.8'

services:
  # ============================================
  # Infrastructure
  # ============================================
  mongodb:
    image: mongo:7
    container_name: rez-intelligence-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rez-intelligence-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # NEW: Agent Registry Service
  # ============================================
  rez-agent-registry:
    build:
      context: ./rez-agent-registry
      dockerfile: Dockerfile
    container_name: rez-agent-registry
    restart: unless-stopped
    ports:
      - "4011:4011"
    environment:
      - NODE_ENV=production
      - PORT=4011
      - LOG_LEVEL=info
      - MONGODB_URI=mongodb://mongodb:27017/rez_registry
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev-token-change-in-prod}
      - HEARTBEAT_INTERVAL_MS=30000
      - HEARTBEAT_TTL_SECONDS=300
      - STALE_THRESHOLD_MS=120000
      - HEALTH_CHECK_INTERVAL_SECONDS=60
      - HEALTH_CHECK_TIMEOUT_MS=5000
      - MAX_CONSECUTIVE_FAILURES=3
      - ENABLE_CRON_SCHEDULE=false
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,https://rez.money}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # NEW: WhatsApp Orchestrator Bridge
  # ============================================
  rez-whatsapp-orchestrator-bridge:
    build:
      context: ./rez-whatsapp-orchestrator-bridge
      dockerfile: Dockerfile
    container_name: rez-whatsapp-orchestrator-bridge
    restart: unless-stopped
    ports:
      - "4010:4010"
    environment:
      - NODE_ENV=production
      - PORT=4010
      - LOG_LEVEL=info
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev-token-change-in-prod}
      - ORCHESTRATOR_URL=http://rez-orchestrator-v2:4015
      - WHATSAPP_API_URL=${WHATSAPP_API_URL:-https://graph.facebook.com/v18.0}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - WHATSAPP_WEBHOOK_VERIFY_TOKEN=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET:-}
      - SESSION_TTL_SECONDS=86400
      - MAX_RETRIES=3
      - RETRY_DELAY_MS=1000
      - PROCESSING_INTERVAL_MS=500
      - MAX_QUEUE_SIZE=1000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,https://rez.money}
    depends_on:
      redis:
        condition: service_healthy
      rez-orchestrator-v2:
        condition: service_started
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

