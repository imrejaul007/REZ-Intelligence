version: '3.9'

services:
  # Event Bus Service
  event-bus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rez-event-bus
    ports:
      - "4031:4031"
    environment:
      - NODE_ENV=production
      - PORT=4031
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4031/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis for pub/sub
  redis:
    image: redis:7-alpine
    container_name: rez-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MongoDB (optional - for Event persistence if needed)
  mongodb:
    image: mongo:7
    container_name: rez-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  rez-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  mongodb-data:
    driver: local
