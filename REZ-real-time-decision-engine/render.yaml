# Render.com Blueprint for REZ Real-Time Decision Engine
# Deploy with: render-blueprints apply

services:
  - type: web
    name: rez-real-time-decision-engine
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: ALLOWED_ORIGINS
        sync: false
        description: Comma-separated list of allowed CORS origins
      # Redis configuration for caching and rate limiting
      - key: REDIS_URL
        sync: false
        description: Redis connection URL for caching
      # ML Model endpoints (would be configured in production)
      - key: ML_MODEL_SERVICE_URL
        sync: false
      - key: ML_MODEL_API_KEY
        sync: false
        description: API key for ML model service

# Scheduled jobs (for maintenance tasks)
jobs:
  - name: cleanup-old-decisions
    schedule: "0 */6 * * *"
    command: npm run cleanup
    regions:
      - oregon

# Database (if needed for decision history)
databases:
  - name: rez-decision-engine-db
    plan: starter
    region: oregon
    databaseName: decision_engine
    ipAllowList: []

# Redis for caching
redis:
  - name: rez-decision-engine-cache
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru

# Scaling configuration
scale:
  minInstances: 1
  maxInstances: 5
  targetResponseTime: 100

# Health checks
healthCheck:
  enabled: true
  path: /health
  interval: 30s
  timeout: 10s
  threshold: 3

# Environment-specific overrides
environments:
  - name: staging
    plan: starter
    autoDeploy: true
    branch: develop
  - name: production
    plan: starter
    autoDeploy: false
    branch: main
