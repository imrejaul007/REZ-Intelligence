# REZ Memory Layer - Docker Compose
# For local development and testing

version: '3.8'

services:
  # REZ Memory Layer API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rez-memory-api
    restart: unless-stopped
    ports:
      - "4201:4201"
    environment:
      - NODE_ENV=production
      - PORT=4201
      - MONGODB_URI=mongodb://mongodb:27017/rez_memory_layer
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev-token}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=1000
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - REZ_EVENT_BUS_URL=${REZ_EVENT_BUS_URL:-http://event-bus:4025}
      - REZ_INTELLIGENCE_URL=${REZ_INTELLIGENCE_URL:-http://localhost:4018}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4201/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - rez-network

networks:
  rez-network:
    external: true
