name: Capture Deployment Errors

on:
  workflow_run:
    workflows: ['ReZ CI Pipeline', 'CI']
    types: [completed]

jobs:
  capture-failure:
    name: Capture Error
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'push'
    steps:
      - name: Create error issue
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.payload.workflow_run.repository.name;
            const runId = context.payload.workflow_run.id;
            const runUrl = context.payload.workflow_run.html_url;
            const commit = context.payload.workflow_run.head_sha;
            const branch = context.payload.workflow_run.head_branch;
            const jobName = context.payload.workflow_run.name;
            const conclusion = context.payload.workflow_run.conclusion;

            const title = `[${repo}][DEPLOY-ERROR] Pipeline failed: ${jobName}`;
            const body = `## Deployment Error Captured

**Repository:** ${repo}
**Workflow:** ${jobName}
**Branch:** ${branch}
**Commit:** \`${commit}\`
**Conclusion:** ${conclusion}
**Run URL:** ${runUrl}

### Auto-captured by CI

This issue was automatically created from a failed workflow run.

**Next Steps:**
1. Investigate the failure in the workflow run
2. Apply fix in the source repository
3. Document root cause below
4. Add prevention action (CI rule, test, or validation)

---
*Automated error capture — do not edit title*`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: 'rez-error-intelligence',
              title,
              body,
              labels: ['deploy-error', 'auto-captured', repo]
            });
