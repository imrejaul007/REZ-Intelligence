apiVersion: v1
kind: Namespace
metadata:
  name: rez-ai
  labels:
    name: rez-ai
    environment: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rez-config
  namespace: rez-ai
data:
  REDIS_URL: "redis://rez-redis:6379"
  DATABASE_URL: "postgres://rez:changeme@rez-postgres:5432/rez_main"
  NODE_ENV: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: rez-secrets
  namespace: rez-ai
type: Opaque
stringData:
  DATABASE_PASSWORD: "your-secure-password-here"
  JWT_SECRET: "your-jwt-secret-here"
  API_KEYS: "your-api-keys-here"
