---
# Horizontal Pod Autoscaler for AI Orchestrator
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rez-ai-orchestrator-hpa
  namespace: rez-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rez-ai-orchestrator
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
