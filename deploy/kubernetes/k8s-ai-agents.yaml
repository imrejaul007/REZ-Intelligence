---
# REZ AI Agent Registry - K8s Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rez-agent-registry
  namespace: rez-ai
  labels:
    app: rez-agent-registry
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rez-agent-registry
  template:
    metadata:
      labels:
        app: rez-agent-registry
        tier: backend
    spec:
      containers:
        - name: rez-agent-registry
          image: rez/agent-registry:latest
          ports:
            - containerPort: 5007
              name: http
          envFrom:
            - configMapRef:
                name: rez-config
            - secretRef:
                name: rez-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5007
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 5007
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rez-agent-registry
  namespace: rez-ai
spec:
  selector:
    app: rez-agent-registry
  ports:
    - name: http
      port: 5007
      targetPort: 5007
  type: ClusterIP
---
# REZ AI Orchestrator - K8s Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rez-ai-orchestrator
  namespace: rez-ai
  labels:
    app: rez-ai-orchestrator
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rez-ai-orchestrator
  template:
    metadata:
      labels:
        app: rez-ai-orchestrator
        tier: backend
    spec:
      containers:
        - name: rez-ai-orchestrator
          image: rez/ai-orchestrator:latest
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: rez-config
            - secretRef:
                name: rez-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rez-ai-orchestrator
  namespace: rez-ai
spec:
  selector:
    app: rez-ai-orchestrator
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
