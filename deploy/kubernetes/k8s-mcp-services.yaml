---
# MCP Analytics Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rez-mcp-analytics
  namespace: rez-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rez-mcp-analytics
  template:
    metadata:
      labels:
        app: rez-mcp-analytics
    spec:
      containers:
        - name: rez-mcp-analytics
          image: rez/mcp-analytics:latest
          ports:
            - containerPort: 4101
          envFrom:
            - configMapRef:
                name: rez-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: rez-mcp-analytics
  namespace: rez-ai
spec:
  selector:
    app: rez-mcp-analytics
  ports:
    - port: 4101
      targetPort: 4101
  type: ClusterIP
