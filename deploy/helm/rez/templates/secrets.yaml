{{/*
Secrets for sensitive configuration
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rez.fullname" . }}-auth
  labels:
    {{- include "rez.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.gateway.auth.jwt.secret }}
  jwt-secret: {{ .Values.gateway.auth.jwt.secret }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 32 | quote }}
  {{- end }}
  admin-password: {{ randAlphaNum 16 | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rez.fullname" . }}-secrets
  labels:
    {{- include "rez.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  database-url: postgresql://{{ index .Values.postgresql "auth" "username" }}:{{ index .Values.postgresql "auth" "postgresPassword" }}@{{ include "rez.postgres.fullname" . }}:5432/{{ index .Values.postgresql "auth" "database" }}
  {{- end }}
  redis-url: redis://:{{ index .Values.redis "auth" "password" }}@{{ include "rez.redis.fullname" . }}:6379/0