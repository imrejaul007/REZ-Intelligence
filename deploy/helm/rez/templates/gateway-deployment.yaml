{{/*
Gateway Deployment
*/}}
{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rez.gateway.fullname" . }}
  labels:
    {{- include "rez.labels" . | nindent 4 }}
    app: rez-gateway
    component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: rez-gateway
      component: gateway
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- include "rez.podAnnotations" (dict "podAnnotations" .Values.podAnnotations) | nindent 8 }}
      labels:
        app: rez-gateway
        component: gateway
        {{- include "rez.labels" . | nindent 8 }}
    spec:
      {{- include "rez.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "rez.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          image: {{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: {{ .Values.env | default (dict "LOG_LEVEL" "info") | toJson }}
            {{- if .Values.gateway.auth.enabled }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "rez.fullname" . }}-auth
                  key: jwt-secret
                  optional: true
            {{- end }}
            - name: REDIS_URL
              value: "redis://{{ include "rez.redis.fullname" . }}:6379"
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ include "rez.postgres.fullname" . }}:5432/{{ (index .Values "postgresql" "auth" "database") }}"
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}
          volumeMounts:
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
          {{- if .Values.gateway.rateLimit.enabled }}
          args:
            - --rate-limit
            - "{{ .Values.gateway.rateLimit.requestsPerMinute }}"
            - --rate-limit-burst
            - "{{ .Values.gateway.rateLimit.burstSize }}"
          {{- end }}
      volumes:
        {{- toYaml .Values.extraVolumes | nindent 8 }}
      {{- if .Values.gateway.affinity }}
      affinity:
        {{- toYaml .Values.gateway.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: rez-gateway
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- if .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml .Values.gateway.tolerations | nindent 8 }}
      {{- end }}
{{- end }}