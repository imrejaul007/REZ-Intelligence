{{/*
Agent Registry Service Deployment
*/}}
{{- if .Values.agentRegistry.enabled }}
{{- $svc := .Values.agentRegistry }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rez.fullname" . }}-agents
  labels:
    {{- include "rez.labels" . | nindent 4 }}
    app: agents
spec:
  replicas: {{ $svc.replicaCount | default 2 }}
  selector:
    matchLabels:
      app: agents
  template:
    metadata:
      labels:
        app: agents
        {{- include "rez.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "rez.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agents
          image: {{ $svc.image.repository }}:{{ $svc.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ $svc.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ $svc.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          env:
            - name: PORT
              value: {{ quote $svc.service.port }}
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ include "rez.postgres.fullname" . }}:5432/{{ (index .Values "postgresql" "auth" "database") }}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rez.fullname" . }}-agents
  labels:
    {{- include "rez.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $svc.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: agents
{{- end }}