apiVersion: v2
name: rez
description: REZ Agent OS - Enterprise deployment Helm chart
type: application
version: 1.0.0
appVersion: "1.0"
keywords:
  - ai
  - agents
  - mcp
  - automation
  - enterprise
maintainers:
  - name: REZ Team
    email: team@rez.io
home: https://rez.io
icon: https://rez.io/logo.png

# Dependencies
dependencies:
  - name: postgresql
    version: "12.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "17.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: prometheus
    version: "25.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "8.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled

# Kubernetes version compatibility
kubeVersion: ">=1.24.0"

annotations:
  category: Application
  licenses: MIT
