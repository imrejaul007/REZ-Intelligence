version: '3.8'

services:
  # ============================================
  # CORE INFRASTRUCTURE
  # ============================================

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rez
      POSTGRES_PASSWORD: rez_secret
      POSTGRES_DB: rez_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: rez
      MONGO_INITDB_ROOT_PASSWORD: rez_secret

  # ============================================
  # AI AGENTS
  # ============================================

  rez-fraud-agent:
    build:
      context: ../rez-fraud-agent
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://rez:rez_secret@postgres:5432/rez_main
    depends_on:
      - redis
      - postgres

  rez-sales-agent:
    build:
      context: ../rez-sales-agent
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  rez-support-agent:
    build:
      context: ../rez-support-agent
      dockerfile: Dockerfile
    ports:
      - "4003:4003"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  rez-consultant-agent:
    build:
      context: ../rez-consultant-agent
      dockerfile: Dockerfile
    ports:
      - "4004:4004"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  rez-info-agent:
    build:
      context: ../rez-info-agent
      dockerfile: Dockerfile
    ports:
      - "4005:4005"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  rez-planning-agent:
    build:
      context: ../REZ-planning-agent
      dockerfile: Dockerfile
    ports:
      - "4006:4006"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  # ============================================
  # MCP SERVICES
  # ============================================

  rez-mcp-analytics:
    build:
      context: ../rez-mcp-analytics
      dockerfile: Dockerfile
    ports:
      - "4101:4101"
    environment:
      - NODE_ENV=production
    depends_on:
      - mongodb

  rez-mcp-automl:
    build:
      context: ../rez-mcp-automl
      dockerfile: Dockerfile
    ports:
      - "4102:4102"
    environment:
      - NODE_ENV=production
    depends_on:
      - redis

  rez-mcp-contracts:
    build:
      context: ../rez-mcp-contracts
      dockerfile: Dockerfile
    ports:
      - "4103:4103"
    environment:
      - NODE_ENV=production
    depends_on:
      - postgres

  rez-mcp-event-bus:
    build:
      context: ../rez-mcp-event-bus
      dockerfile: Dockerfile
    ports:
      - "4104:4104"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  rez-mcp-identity:
    build:
      context: ../rez-mcp-identity
      dockerfile: Dockerfile
    ports:
      - "4105:4105"
    environment:
      - NODE_ENV=production
    depends_on:
      - mongodb

  rez-mcp-inventory:
    build:
      context: ../rez-mcp-inventory
      dockerfile: Dockerfile
    ports:
      - "4106:4106"
    environment:
      - NODE_ENV=production
    depends_on:
      - postgres

  rez-mcp-legal:
    build:
      context: ../rez-mcp-legal
      dockerfile: Dockerfile
    ports:
      - "4107:4107"
    environment:
      - NODE_ENV=production
    depends_on: []

  rez-mcp-invoice:
    build:
      context: ../rez-mcp-invoice
      dockerfile: Dockerfile
    ports:
      - "4108:4108"
    environment:
      - NODE_ENV=production
    depends_on: []

  rez-mcp-ranking:
    build:
      context: ../rez-mcp-ranking
      dockerfile: Dockerfile
    ports:
      - "4109:4109"
    environment:
      - NODE_ENV=production
    depends_on:
      - redis

  rez-mcp-cosmic-twin:
    build:
      context: ../rez-mcp-cosmic-twin
      dockerfile: Dockerfile
    ports:
      - "4110:4110"
    environment:
      - NODE_ENV=production
    depends_on:
      - redis

  # ============================================
  # AGENT ORCHESTRATION
  # ============================================

  rez-agent-registry:
    build:
      context: ../rez-agent-registry
      dockerfile: Dockerfile
    ports:
      - "5007:5007"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PORT=5007
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rez-ai-orchestrator:
    build:
      context: ../REZ-ai-orchestrator
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://rez:rez_secret@postgres:5432/rez_main
    depends_on:
      - redis
      - postgres
      - rez-agent-registry

  # ============================================
  # AGENT BUILDER UI
  # ============================================

  rez-agent-builder-ui:
    build:
      context: ../../RABTUL-Technologies/REZ-agent-builder-ui
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://rez-agent-registry:5007
    depends_on:
      - rez-agent-registry

  # ============================================
  # EXPERT SERVICES
  # ============================================

  rez-finance-expert:
    build:
      context: ../REZ-finance-expert
      dockerfile: Dockerfile
    ports:
      - "4201:4201"
    environment:
      - NODE_ENV=production
    depends_on:
      - postgres

  rez-health-expert:
    build:
      context: ../rez-health-expert
      dockerfile: Dockerfile
    ports:
      - "4202:4202"
    environment:
      - NODE_ENV=production
    depends_on:
      - mongodb

  rez-hospitality-expert:
    build:
      context: ../rez-hospitality-expert
      dockerfile: Dockerfile
    ports:
      - "4203:4203"
    environment:
      - NODE_ENV=production
    depends_on:
      - postgres

  # ============================================
  # INTELLIGENCE SERVICES
  # ============================================

  rez-recommendation-engine:
    build:
      context: ../REZ-recommendation-engine
      dockerfile: Dockerfile
    ports:
      - "4301:4301"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  rez-prediction-engine:
    build:
      context: ../REZ-predictive-engine
      dockerfile: Dockerfile
    ports:
      - "4302:4302"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://rez:rez_secret@postgres:5432/rez_main
    depends_on:
      - postgres

  rez-sentiment-analysis:
    build:
      context: ../REZ-sentiment-analysis
      dockerfile: Dockerfile
    ports:
      - "4303:4303"
    environment:
      - NODE_ENV=production
    depends_on: []

  # ============================================
  # MONITORING
  # ============================================

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  redis_data:
  postgres_data:
  mongo_data:
  prometheus_data:
  grafana_data:
