services:
  - type: web
    name: rez-intent-predictor
    env: node
    region: singapore
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4018
      - key: MONGODB_URI
        sync: false
