version: '3.8'

services:
  signal-aggregator:
    build: .
    ports:
      - "4059:4059"
    environment:
      - PORT=4059
      - MONGODB_URI=mongodb://mongodb:27017/rez-signals
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL=300
      - REALTIME_CACHE_TTL=30
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - REZ_LOCATION_SERVICE_URL=http://location-service:4013
      - REZ_BEHAVIORAL_SERVICE_URL=http://behavioral-service:4014
      - REZ_SOCIAL_SERVICE_URL=http://social-service:4015
      - REZ_COMPETITOR_SERVICE_URL=http://competitor-service:4016
      - REZ_ENGAGEMENT_SERVICE_URL=http://engagement-service:4017
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4059/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
