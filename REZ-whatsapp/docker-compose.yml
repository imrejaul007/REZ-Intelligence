# REZ WhatsApp Service - Docker Compose
# For local development and testing

version: '3.8'

services:
  # REZ WhatsApp API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rez-whatsapp-api
    restart: unless-stopped
    ports:
      - "4202:4202"
    environment:
      - NODE_ENV=production
      - PORT=4202
      - MONGODB_URI=mongodb://mongodb:27017/rez-whatsapp
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev-token}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX=100
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      # Twilio Configuration
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - WHATSAPP_PHONE_NUMBER=${WHATSAPP_PHONE_NUMBER}
      - WHATSAPP_BUSINESS_ACCOUNT_ID=${WHATSAPP_BUSINESS_ACCOUNT_ID}
      - TWILIO_VERIFY_TOKEN=${TWILIO_VERIFY_TOKEN:-my_verify_token}
      # External Services
      - PAYMENT_SERVICE_URL=${PAYMENT_SERVICE_URL:-http://payment-service:4001}
      - DELIVERY_SERVICE_URL=${DELIVERY_SERVICE_URL:-http://delivery-service:4009}
      - USER_SERVICE_URL=${USER_SERVICE_URL:-http://user-service:4013}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4202/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - rez-network

networks:
  rez-network:
    external: true
