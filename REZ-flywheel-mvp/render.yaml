services:
  - type: web
    name: rez-flywheel-mvp
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4101
      - key: MONGODB_URI
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
