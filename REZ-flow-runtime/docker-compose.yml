# REZ Flow Runtime - Docker Compose
# For local development and testing

version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: rez-flow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: rez-flow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # REZ Flow Runtime API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rez-flow-api
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=production
      - PORT=4200
      - MONGODB_URI=mongodb://mongodb:27017/rez-flow-runtime
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev-token}
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4200/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # REZ Flow Runtime Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rez-flow-worker
    restart: unless-stopped
    command: ["node", "dist/workers/executionWorker.js"]
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/rez-flow-runtime
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev-token}
      - WORKER_CONCURRENCY=5
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  mongodb_data:
  redis_data:

networks:
  default:
    name: rez-flow-network
